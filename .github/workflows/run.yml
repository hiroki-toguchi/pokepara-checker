name: check_blog

on:
  schedule:
    - cron: "*/3 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # artifact ダウンロード（v4に変更）
      - name: Download last blog
        uses: actions/download-artifact@v4
        with:
          name: last_blog
          path: ./last_blog/
        continue-on-error: true

      - name: Run Python to get latest blog
        id: blog
        run: python main.py

      # Discord通知（v3に変更）
      - name: Send Discord Notification
        if: steps.blog.outputs.new == 'true'
        uses: Ilshidur/action-discord@v3
        with:
          webhook: ${{ secrets.WEBHOOK_URL }}
          message: |
            新着ブログ！
            タイトル: ${{ steps.blog.outputs.title }}
            URL: ${{ steps.blog.outputs.link }}
            画像: ${{ steps.blog.outputs.img }}

      # artifact 保存（v4に変更）
      - name: Upload last blog
        if: steps.blog.outputs.new == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: last_blog
          path: last.txt
